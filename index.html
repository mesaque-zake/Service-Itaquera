<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  
  <title>Service - Itaquera</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@300;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #ffffff;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: 'Inter', sans-serif; }

    /* --- OFFLINE TOAST (Adaptado para Fundo Claro) --- */
    #offline-toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 59, 48, 0.15); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 59, 48, 0.4); padding: 12px 24px; border-radius: 30px;
      z-index: 10000; display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 0.9rem; color: #ff3b30;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #offline-toast.show { top: env(safe-area-inset-top, 20px); }

    /* --- O IFRAME (Sandboxing Robusto) --- */
    #app-frame {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; display: block; opacity: 0; visibility: hidden;
      padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
      transition: opacity 0.8s ease-in, visibility 0.8s;
      z-index: 1;
    }
    #app-frame.loaded { opacity: 1; visibility: visible; }

    /* --- SPLASH SCREEN PRINCIPAL --- */
    #splash {
      position: fixed; inset: 0; background: var(--bg-color);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9000; transition: opacity 0.8s ease-out, visibility 0.8s; overflow: hidden;
    }
    #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* --- ANIMAÇÕES DE FUNDO (Luzes Suaves) --- */
    .blob {
      position: absolute; border-radius: 50%; filter: blur(60px); z-index: 0; opacity: 0.4;
      will-change: transform; animation: floatBlobs 15s infinite alternate ease-in-out;
    }
    /* Usando blend-mode multiply para luzes sutis em fundo branco */
    .blob-1 { width: 45vw; height: 45vw; max-width: 500px; max-height: 500px; background: #0071e3; top: -10%; left: -10%; animation-delay: 0s; mix-blend-mode: multiply; }
    .blob-2 { width: 55vw; height: 55vw; max-width: 600px; max-height: 600px; background: #ff9500; bottom: -10%; right: -10%; animation-delay: -5s; mix-blend-mode: multiply;}
    .blob-3 { width: 40vw; height: 40vw; max-width: 400px; max-height: 400px; background: #34c759; top: 40%; left: 30%; animation-delay: -10s; mix-blend-mode: multiply;}

    @keyframes floatBlobs {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(8vw, 12vh) scale(1.1); }
      100% { transform: translate(-8vw, -8vh) scale(0.9); }
    }

    /* O Vidro Fosco Geral da Tela */
    #glass-overlay {
      position: absolute; inset: 0; z-index: 1;
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      background: rgba(255, 255, 255, 0.4);
    }

    /* --- COREOGRAFIA DA INTERFACE (Via CSS) --- */
    
    /* 1. Logo Sesc (Inicia no centro, move para o rodapé no segundo 1.2) */
    .footer-splash {
      position: absolute; left: 50%; bottom: 50%; transform: translate(-50%, 50%) scale(1.5);
      z-index: 10; text-align: center; width: 100%;
      animation: moveLogo 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 1.2s;
    }
    @keyframes moveLogo {
      to { bottom: calc(env(safe-area-inset-bottom, 24px) + 20px); transform: translate(-50%, 0) scale(1); }
    }
    .sesc-logo { width: clamp(100px, 15vw, 140px); filter: drop-shadow(0 4px 10px rgba(0,0,0,0.05)); }
    
    /* Texto "Powered by" (Surgindo suavemente) */
    .powered-by { 
      font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; opacity: 0;
      animation: fadeInText 1s ease forwards; animation-delay: 2.2s;
    }
    .powered-by strong { color: var(--text-main); }
    @keyframes fadeInText { to { opacity: 1; } }

    /* 2. Textos Principais Livres na Tela */
    .center-content { position: relative; z-index: 10; text-align: center; width: 90%; max-width: 500px; margin-top: -80px; }
    
    .hero-titles {
      opacity: 0; transform: translateY(20px);
      animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 2.0s;
    }
    .welcome-text { font-size: clamp(0.9rem, 1.5vw, 1.2rem); font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
    .brand-service { font-family: 'Montserrat', sans-serif; font-size: clamp(3rem, 10vw, 6rem); font-weight: 800; color: var(--text-main); margin-bottom: -5px; letter-spacing: -2px; line-height: 1; }
    .brand-unidade { font-family: 'Inter', sans-serif; font-size: clamp(1rem, 2vw, 1.3rem); font-weight: 400; color: var(--text-muted); margin-top: 8px;}
    
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* 3. Botão de Iniciar */
    .start-container {
      margin-top: 50px; opacity: 0; transform: translateY(20px);
      animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 2.5s;
    }

    #btn-start {
      background: #000000; color: #ffffff; font-family: 'Inter', sans-serif;
      font-size: 1.1rem; font-weight: 600; padding: 18px 45px; border: none; border-radius: 50px;
      cursor: pointer; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); outline: none; width: 100%; max-width: 280px;
    }
    #btn-start:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); }
    #btn-start:active { transform: translateY(1px); }
    
    /* Estados de Lógica de Carregamento (O Cão de Guarda) */
    #btn-start:disabled { background: #e5e5ea; color: #86868b; cursor: wait; transform: none; box-shadow: none; }
    #btn-start.error-state { background: #ff3b30; color: #ffffff; box-shadow: 0 8px 25px rgba(255, 59, 48, 0.3); font-size: 1rem; }

  </style>
</head>
<body>

  <div id="offline-toast"><span>&#9888;</span> Sem conexão de internet</div>

  <div id="splash">
    
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div> 
    
    <div id="glass-overlay"></div>
    
    <div class="center-content">
      <div class="hero-titles">
        <div class="welcome-text">Bem-vindo ao</div>
        <h1 class="brand-service">SERVICE</h1>
        <h2 class="brand-unidade">Unidade Itaquera</h2>
      </div>
      
      <div class="start-container">
        <button id="btn-start">Iniciando...</button>
      </div>
    </div>

    <div class="footer-splash">
      <img src="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/SescLogo.png" alt="Sesc Logo" class="sesc-logo">
      <div class="powered-by">Powered with <span style="color: #ff2d55;">&#10084;</span> by <strong>Mesaque</strong></div>
    </div>
  </div>

  <iframe 
     id="app-frame" 
     allow="geolocation; microphone; camera; clipboard-write; autoplay; fullscreen"
     sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-modals allow-downloads allow-storage-access-by-user-activation"
  ></iframe>
  
  <script>
    // ELEMENTOS DOM
    const splash = document.getElementById('splash');
    const iframe = document.getElementById('app-frame');
    const btnStart = document.getElementById('btn-start');
    const offlineToast = document.getElementById('offline-toast');
    
    // URL DO SEU GAS
    const gasUrl = "https://script.google.com/macros/s/AKfycbxzjNxBAt3Q3_Ox0j8Mg-fKkoyJtyUHLUUFjHjfa_yH9yv8VrP0dMmKXyKAF_pbx5z-mg/exec";

    // VARIÁVEIS DE ESTADO DA ENGENHARIA
    let isGasLoaded = false;
    let hasUserClicked = false;
    let isErrorState = false;

    // MONITOR DE INTERNET NATIVO
    window.addEventListener('offline', () => offlineToast.classList.add('show'));
    window.addEventListener('online', () => offlineToast.classList.remove('show'));

    // 1. CARREGAMENTO PARALELO (Injeta a URL imediatamente)
    iframe.src = gasUrl;

    // 2. O CÃO DE GUARDA (Fail-safe para o GAS de 15 segundos)
    const watchdogTimer = setTimeout(() => {
      if (!isGasLoaded) {
        isErrorState = true;
        btnStart.innerText = "Falha na rede. Tentar de novo?";
        btnStart.classList.add('error-state');
        btnStart.disabled = false; 
      }
    }, 15000);

    // 3. RETORNO DE VIDA DO GOOGLE (Quando carrega)
    iframe.onload = () => {
      if (iframe.src === 'about:blank') return;
      
      isGasLoaded = true;
      clearTimeout(watchdogTimer); 

      // Se o usuário já clicou e estava esperando, libera na hora
      if (hasUserClicked) {
        revealApp();
      } else {
        // Se ainda não clicou, prepara o botão
        btnStart.innerText = "Acessar Serviço";
        btnStart.disabled = false;
      }
    };

    // 4. LÓGICA DO CLIQUE
    btnStart.addEventListener('click', () => {
      if (!navigator.onLine) { 
        offlineToast.classList.add('show');
        setTimeout(() => offlineToast.classList.remove('show'), 3000);
        return; 
      }

      // Tratamento de Erro (Recarrega a página)
      if (isErrorState) {
        window.location.reload();
        return;
      }

      hasUserClicked = true;

      if (isGasLoaded) {
        // Oculta a Splash e revela o Iframe
        revealApp();
        // Prevenção do botão voltar do celular (History Trap)
        history.pushState({ screen: 'app' }, '', window.location.href);
      } else {
        // Segura a ansiedade do usuário
        btnStart.innerText = "Conectando ao Google...";
        btnStart.disabled = true;
      }
    });

    // 5. TRANSIÇÃO LIMPA
    function revealApp() {
      splash.classList.add('hidden');
      iframe.classList.add('loaded');
    }

    // 6. HISTORY TRAP (Segura o botão de voltar do Celular)
    history.replaceState({ screen: 'splash' }, '', window.location.href);
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.screen === 'splash') {
        splash.classList.remove('hidden');
        iframe.classList.remove('loaded');
      }
    });

    // 7. REGISTRO PWA (Service Worker)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
