<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  
  <title>Service - Itaquera</title>
  
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@300;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #ffffff;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --truck-color: #000000; /* Caminhão Preto conforme pedido */
      --chair-color: rgba(0, 0, 0, 0.08); /* Cadeiras sutis */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: 'Inter', sans-serif; color: var(--text-main); }

    /* --- IFRAME (ESCONDIDO TOTALMENTE) --- */
    #app-frame {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
      opacity: 0; z-index: -1; pointer-events: none;
      transition: opacity 1s ease-in-out;
      /* Suporte safe-area iOS */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #app-frame.loaded { opacity: 1; z-index: 20; pointer-events: all; }

    /* --- SPLASH SCREEN --- */
    #splash-screen {
      position: absolute; inset: 0; z-index: 10;
      background-color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease-in-out, visibility 0.8s;
      padding: 0 24px;
    }
    #splash-screen.hidden { opacity: 0; visibility: hidden; }

    /* --- ANIMAÇÃO LOGÍSTICA (Atrás do Vidro) --- */
    #logistic-stage {
      position: absolute; bottom: 8vh; left: 0; width: 100%; height: 160px; z-index: 11;
      overflow: hidden; pointer-events: none;
    }

    #truck {
      position: absolute; left: -100px; bottom: 10px; width: 80px; color: var(--truck-color);
      animation: truckPass 2.8s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
      animation-delay: 1.2s;
    }
    @keyframes truckPass { 0% { left: -100px; } 100% { left: 110%; } }

    .chair-row { display: flex; justify-content: center; width: 100%; gap: clamp(10px, 3vw, 30px); margin-top: 10px; }
    .chair {
      width: clamp(30px, 5vw, 50px); color: var(--chair-color);
      opacity: 0; transform: translateY(15px) scale(0.9);
      animation: chairMount 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    @keyframes chairMount { to { opacity: 1; transform: translateY(0) scale(1); } }

    /* --- PAINEL VIDRO FOSCO (GLASSMORPHISM) --- */
    #glass-panel {
      position: relative; z-index: 12; /* Fica acima das cadeiras */
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.7); border-radius: 30px;
      padding: 60px 40px; text-align: center; width: 100%; max-width: 800px;
      opacity: 0; transform: translateY(40px);
      animation: panelUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 1.5s;
    }
    @keyframes panelUp { to { opacity: 1; transform: translateY(0); } }

    .welcome-text { font-size: clamp(0.9rem, 1.5vw, 1.2rem); font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 8px; }
    .brand-service { font-family: 'Montserrat', sans-serif; font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 800; letter-spacing: -3px; line-height: 1; margin: 0; }
    .brand-unit { font-family: 'Montserrat', sans-serif; font-size: clamp(1rem, 3vw, 2rem); font-weight: 300; text-transform: uppercase; letter-spacing: clamp(6px, 1vw, 12px); margin-top: 5px; margin-bottom: 60px; }

    /* Botão Iniciar */
    .btn-start {
      background: #000000; color: #ffffff; border: none; border-radius: 50px;
      padding: 20px 50px; font-size: 1.2rem; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .btn-start:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,0,0,0.25); }
    .btn-start:active:not(:disabled) { transform: translateY(0) scale(0.96); }
    .btn-start:disabled { background: #e5e5ea; color: #86868b; cursor: wait; box-shadow: none; }

    /* --- FOOTER FIXO --- */
    .footer-splash {
      position: absolute; bottom: env(safe-area-inset-bottom, 24px); width: 100%; text-align: center; z-index: 10;
    }
    .footer-splash img { width: 100px; margin-bottom: 8px; }
    .powered-by { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.5px; }
    .powered-by strong { color: var(--text-main); }
  </style>
</head>
<body>

  <div id="splash-screen">
    
    <div id="logistic-stage">
      <div id="truck">
        <svg viewBox="0 0 640 512" fill="currentColor"><path d="M624 352h-16V243.9c0-12.7-5.1-24.9-14.1-33.9L494 110.1c-9-9-21.2-14.1-33.9-14.1H416V48c0-26.5-21.5-48-48-48H48C21.5 0 0 21.5 0 48v320c0 26.5 21.5 48 48 48h16c0 53 43 96 96 96s96-43 96-96h128c0 53 43 96 96 96s96-43 96-96h48c8.8 0 16-7.2 16-16v-32c0-8.8-7.2-16-16-16zM160 464c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm320 0c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm80-208H416V144h44.1l99.9 99.9V256z"/></svg>
      </div>
      <div id="grid-chairs"></div>
    </div>

    <div id="glass-panel">
      <div class="welcome-text">Bem-vindo ao</div>
      <h1 class="brand-service">SERVICE</h1>
      <h2 class="brand-unit">Unidade Itaquera</h2>
      
      <button id="start-btn" class="btn-start" disabled>Carregando sistema...</button>
    </div>

    <div class="footer-splash">
      <img src="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/SescLogo.png" alt="Sesc Logo">
      <div class="powered-by">Powered with <span style="color: #ff2d55;">&#10084;</span> by <strong>Mesaque</strong></div>
    </div>
  </div>

  <iframe id="app-frame" sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>
  
  <script>
    const splash = document.getElementById('splash-screen');
    const iframe = document.getElementById('app-frame');
    const startBtn = document.getElementById('start-btn');
    const grid = document.getElementById('grid-chairs');

    // 1. Gerar Grid de Cadeiras dinamicamente (Pixel Perfect arrangement)
    function initChairs() {
      // SVG fa-chair (FontAwesome) - Versão elegante
      const svgChair = `<svg viewBox="0 0 448 512" fill="currentColor"><path d="M400 480H48c-26.5 0-48-21.5-48-48V112c0-26.5 21.5-48 48-48h352c26.5 0 48 21.5 48 48v320c0 26.5-21.5 48-48 48zM96 128H64v256h32V128zm288 0h-32v256h32V128zM256 128h-64v256h64V128z"/></svg>`;
      
      const rows = 3;
      const cols = window.innerWidth < 768 ? 7 : 16; // Ajusta densidade por tela

      for (let r = 0; r < rows; r++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'chair-row';
        rowDiv.style.transform = `scale(${1 + (r * 0.1)})`; // Perspective effect
        rowDiv.style.opacity = (1 - (r * 0.2)); // Fading effect for distance
        rowDiv.style.zIndex = 10 - r; // Correct stacking
        
        for (let c = 0; c < cols; c++) {
          const chair = document.createElement('div');
          chair.className = 'chair';
          chair.innerHTML = svgChair;
          // Inicia animação baseada no delay do caminhão + delay sequencial
          let delay = 1.7 + (c * 0.08) + (r * 0.3);
          chair.style.animationDelay = `${delay}s`;
          rowDiv.appendChild(chair);
        }
        grid.appendChild(rowDiv);
      }
    }
    
    // Inicia a montagem
    initChairs();

    // 2. Pré-carregamento do Iframe escondido
    iframe.src = "https://script.google.com/macros/s/AKfycbxzjNxBAt3Q3_Ox0j8Mg-fKkoyJtyUHLUUFjHjfa_yH9yv8VrP0dMmKXyKAF_pbx5z-mg/exec";
    
    iframe.onload = () => {
      // Quando o GAS carrega por completo lá no fundo
      startBtn.textContent = 'Acessar Serviço';
      startBtn.disabled = false;
    };

    // 3. Ação do Botão Iniciar (Reveal)
    startBtn.addEventListener('click', () => {
      splash.classList.add('hidden');
      iframe.classList.add('loaded'); // Revela o iframe apenas aqui
      
      // Empurra um novo estado para proteger o botão voltar
      history.pushState({ screen: 'app' }, '', window.location.href);
    });

    // 4. Prevenção do Botão Voltar (History Trap)
    history.replaceState({ screen: 'splash' }, '', window.location.href);
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.screen === 'splash') {
        splash.classList.remove('hidden');
        iframe.classList.remove('loaded');
      }
    });

    // 5. Registro do Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Erro:', err));
      });
    }
  </script>
</body>
</html>
