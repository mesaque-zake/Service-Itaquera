<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  
  <title>Service - Itaquera</title>
  
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/favicon.png">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/Icon180.png">
  <link rel="manifest" href="./manifest.json">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --bg-color: #ffffff;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      
      /* Cores Institucionais Sesc */
      --sesc-azul: #005EB8;
      --sesc-amarelo: #FFC72C;
    }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main);
    }

    /* --- TOAST DE OFFLINE --- */
    #offline-toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 59, 48, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 59, 48, 0.3); color: #ff3b30;
      padding: 12px 24px; border-radius: 30px; z-index: 10000;
      font-weight: 600; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #offline-toast.show { top: env(safe-area-inset-top, 24px); }

    /* --- IFRAME BACKGROUND --- */
    #app-frame {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
      opacity: 0; visibility: hidden; z-index: 0; background-color: var(--bg-color);
      padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
      transition: opacity 0.8s ease-in-out, visibility 0.8s;
    }
    #app-frame.loaded { opacity: 1; visibility: visible; z-index: 20; pointer-events: all; }

    /* --- SPLASH SCREEN PRINCIPAL --- */
    #splash {
      position: fixed; inset: 0; z-index: 9000; transition: opacity 0.8s ease-out, visibility 0.8s; overflow: hidden;
    }
    #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* LUZES DE FUNDO (Blobs Animados Sesc) - Fundo Máximo */
    .bg-blobs {
      position: absolute; inset: 0; width: 100%; height: 100%; z-index: -3;
      filter: blur(90px); opacity: 0.15;
    }
    .blob { position: absolute; border-radius: 50%; animation: blobMove 15s infinite alternate ease-in-out; }
    .blob-azul { width: 70vw; height: 70vw; background-color: var(--sesc-azul); top: -10%; left: -20%; }
    .blob-amarelo { width: 60vw; height: 60vw; background-color: var(--sesc-amarelo); bottom: -10%; right: -20%; animation-delay: -5s; }
    @keyframes blobMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(15%, 15%) scale(1.2); }
    }

    /* CAMADA DE ANIMAÇÃO DA MONTAGEM - Atrás do Vidro */
    #assembly-layer {
      position: absolute; inset: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none;
    }

    .truck-wrapper {
      position: absolute; opacity: 0; font-size: 3.5rem; 
    }
    .truck-wrapper i { display: block; }
    
    @keyframes driveRight {
      0% { left: -30vw; opacity: 1; }
      95% { opacity: 1; }
      100% { left: 130vw; opacity: 0; }
    }
    @keyframes driveLeft {
      0% { left: 130vw; opacity: 1; }
      95% { opacity: 1; }
      100% { left: -30vw; opacity: 0; }
    }

    .assembly-item {
      position: absolute; opacity: 0; transform: scale(0);
    }

    /* --- O TOQUE FINAL: Camada de Vidro Fosco (Glassmorphism) --- */
    .glass-overlay {
      position: absolute; inset: 0; width: 100%; height: 100%; z-index: -1;
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); /* Desfoque super suave */
      background: rgba(255, 255, 255, 0.15); /* Quase transparente */
    }

    /* --- CONTEÚDO PRINCIPAL (Flutua na Frente do Vidro, Nítido) --- */
    .center-content {
      position: relative; z-index: 10; text-align: center; width: 90%; max-width: 800px;
      opacity: 0; transform: translateY(20px);
      animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 2.2s; /* Após logo descer */
    }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    .welcome-text { font-size: 1rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 0px; }
    
    .brand-service { 
      font-family: 'Montserrat', sans-serif; font-size: clamp(4rem, 12vw, 9rem); 
      font-weight: 900; line-height: 1; letter-spacing: -3px; margin: 0;
      
      background: linear-gradient(110deg, #1d1d1f 35%, #ffffff 50%, #1d1d1f 65%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: lightSweep 4s linear infinite;
    }
    @keyframes lightSweep { to { background-position: 200% center; } }

    .brand-unit { font-family: 'Montserrat', sans-serif; font-size: clamp(1.2rem, 4vw, 2rem); font-weight: 300; color: var(--text-main); text-transform: uppercase; letter-spacing: clamp(6px, 1vw, 12px); margin-top: -5px; margin-bottom: 50px; }

    /* Botão Azul */
    #btn-start {
      background: #e5e5ea; color: #86868b;
      border: none; border-radius: 50px; padding: 18px 50px; 
      font-size: 1.1rem; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: wait; box-shadow: none;
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); outline: none; -webkit-tap-highlight-color: transparent;
    }
    #btn-start.ready {
      background: var(--sesc-azul); color: #ffffff; cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 94, 184, 0.3);
    }
    #btn-start.ready:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0, 94, 184, 0.4); }
    #btn-start.ready:active { transform: translateY(1px); box-shadow: 0 5px 15px rgba(0, 94, 184, 0.2); }
    #btn-start.error-state { background: #ff3b30; color: #ffffff; box-shadow: 0 8px 25px rgba(255, 59, 48, 0.3); }

    /* --- RODAPÉ --- */
    .footer-splash {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(1.3);
      z-index: 10; text-align: center; width: 100%;
      animation: moveBranding 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 1.5s; 
    }
    @keyframes moveBranding {
      to { top: calc(100% - env(safe-area-inset-bottom, 24px) - 60px); transform: translate(-50%, 0) scale(1); }
    }
    .footer-splash img { width: 90px; margin-bottom: 5px; }
    .powered-by { font-size: 0.75rem; color: var(--text-muted); opacity: 1; margin-top: 5px;}
    .powered-by strong { color: var(--text-main); font-weight: 600;}

  </style>
</head>
<body>

  <div id="offline-toast">Sem conexão de internet</div>

  <div id="splash">
    
    <div class="bg-blobs">
      <div class="blob blob-azul"></div>
      <div class="blob blob-amarelo"></div>
    </div>
    
    <div id="assembly-layer"></div>
    
    <div class="glass-overlay"></div>
    
    <div class="center-content">
      <div class="welcome-text">Bem-vindo ao</div>
      <h1 class="brand-service">SERVICE</h1>
      <h2 class="brand-unit">Unidade Itaquera</h2>
      <button id="btn-start" disabled>Preparando...</button>
    </div>

    <div class="footer-splash">
      <img src="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/SescLogo.png" alt="Sesc Logo">
      <div class="powered-by">Powered with <span style="color:#FFFFFF; text-shadow: 0 0 2px rgba(0,0,0,0.3);">&#10084;</span> by <strong>Mesaque</strong></div>
    </div>
  </div>

  <iframe 
     id="app-frame" 
     allow="geolocation; microphone; camera; clipboard-write; autoplay; fullscreen"
     sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-modals allow-downloads"
  ></iframe>
  
  <script>
    // --------------------------------------------------------
    // COREOGRAFIA 3D: TRAPÉZIO E ESPAÇAMENTO PROGRESSIVO
    // --------------------------------------------------------
    function playAssemblyAnimation() {
      const layer = document.getElementById('assembly-layer');
      const truckDuration = 4; // 4 segundos por passagem
      
      // Definição das rotas do caminhão (Perspectiva de Tamanho)
      const truckRoutes = [
        // Passagem 1: Fundo (Caminhão Menor)
        { direction: 'Right', startTime: 0, bottom: '24vh', zIndex: 10, truckScale: 0.6 },
        // Passagem 2: Frente (Caminhão Maior)
        { direction: 'Left',  startTime: 4, bottom: '8vh',  zIndex: 20, truckScale: 1.0 }, 
        // Passagem 3: Topo (Barreiras, Tamanho Médio)
        { direction: 'Right', startTime: 8, bottom: '70vh', zIndex: 5,  truckScale: 0.8 }  
      ];

      // Definição dos itens fixando 10 em cada fileira (Cores Sólidas)
      const elementsConfig = [
        // O Fundo (Achatado): Fileiras 4 e 3 quase coladas (3vh de gap), 10 cadeiras espremidas (50% e 60% de largura)
        { items: 10, icon: 'fa-chair', bottom: '25vh', scale: 0.55, color: '#4a4a4a', zIndex: 1, routeIndex: 0, widthPercent: 0.50 },
        { items: 10, icon: 'fa-chair', bottom: '22vh', scale: 0.70, color: '#3b3b3b', zIndex: 2, routeIndex: 0, widthPercent: 0.60 },
        
        // A Frente (Espaçado): Fileiras 2 e 1 distantes (Corredor 10vh gap), 10 cadeiras espalhadas (70% e 85% de largura)
        { items: 10, icon: 'fa-chair', bottom: '12vh', scale: 0.85, color: '#2c2c2c', zIndex: 3, routeIndex: 1, widthPercent: 0.70 },
        { items: 10, icon: 'fa-chair', bottom: '4vh',  scale: 1.05, color: '#1d1d1f', zIndex: 4, routeIndex: 1, widthPercent: 0.85 },
        
        // Barreiras de trânsito
        { items: 4, icon: 'fa-road-barrier', bottom: '70vh', scale: 1.2, color: '#FF8C00', zIndex: 1, routeIndex: 2, widthPercent: 0.60 }
      ];

      // 1. Cria os caminhões 
      truckRoutes.forEach((route) => {
        let wrapper = document.createElement('div');
        wrapper.className = 'truck-wrapper';
        wrapper.style.bottom = route.bottom;
        wrapper.style.zIndex = route.zIndex; 
        wrapper.style.animation = `drive${route.direction} ${truckDuration}s linear forwards`;
        wrapper.style.animationDelay = `${route.startTime}s`;
        
        let truckIcon = document.createElement('i');
        truckIcon.className = 'fa-solid fa-truck';
        truckIcon.style.color = 'var(--sesc-azul)';
        
        let flipDir = route.direction === 'Left' ? -1 : 1;
        truckIcon.style.transform = `scaleX(${flipDir}) scale(${route.truckScale})`;

        wrapper.appendChild(truckIcon);
        layer.appendChild(wrapper);
      });

      // 2. Posiciona as cadeiras e barreiras (Matemática do Trapézio)
      elementsConfig.forEach(row => {
        let route = truckRoutes[row.routeIndex];
        let containerWidth = window.innerWidth;
        
        let rowWidth = containerWidth * row.widthPercent;
        let startX = (containerWidth - rowWidth) / 2; // Centralizado
        let gap = rowWidth / (row.items - 1);

        for (let i = 0; i < row.items; i++) {
          let item = document.createElement('i');
          item.className = `fa-solid ${row.icon} assembly-item`;
          item.style.color = row.color;
          
          let posX = startX + (i * gap);
          item.style.left = `${posX}px`;
          item.style.bottom = row.bottom;
          item.style.zIndex = row.zIndex;
          
          let itemIndexForDelay = route.direction === 'Right' ? i : (row.items - 1 - i);
          let popDelay = route.startTime + (truckDuration * (itemIndexForDelay / row.items)) + 0.3; 
          
          setTimeout(() => {
            item.style.transition = "all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
            item.style.opacity = '1'; 
            item.style.transform = `scale(${row.scale})`;
          }, popDelay * 1000);

          layer.appendChild(item);
        }
      });
    }
    
    // Inicia a coreografia ao abrir
    playAssemblyAnimation();

    // --------------------------------------------------------
    // LÓGICA CORE DO PWA E IFRAME
    // --------------------------------------------------------
    const splash = document.getElementById('splash');
    const iframe = document.getElementById('app-frame');
    const btnStart = document.getElementById('btn-start');
    const offlineToast = document.getElementById('offline-toast');
    
    const gasUrl = "https://script.google.com/macros/s/AKfycbxzjNxBAt3Q3_Ox0j8Mg-fKkoyJtyUHLUUFjHjfa_yH9yv8VrP0dMmKXyKAF_pbx5z-mg/exec";

    let isGasLoaded = false;
    let hasUserClicked = false;
    let isErrorState = false;

    window.addEventListener('offline', () => offlineToast.classList.add('show'));
    window.addEventListener('online', () => offlineToast.classList.remove('show'));

    iframe.src = gasUrl;

    const watchdogTimer = setTimeout(() => {
      if (!isGasLoaded) {
        isErrorState = true;
        btnStart.innerText = "Falha de conexão. Tentar novamente?";
        btnStart.classList.remove('ready');
        btnStart.classList.add('error-state');
        btnStart.disabled = false;
      }
    }, 15000);

    iframe.onload = () => {
      if (iframe.src === 'about:blank') return;
      
      isGasLoaded = true;
      clearTimeout(watchdogTimer); 

      if (hasUserClicked) {
        revealApp();
      } else {
        if (btnStart.disabled && !isErrorState) {
          btnStart.innerText = "Acessar";
          btnStart.classList.add('ready');
          btnStart.disabled = false;
        }
      }
    };

    btnStart.addEventListener('click', () => {
      if (!navigator.onLine) { 
        offlineToast.classList.add('show');
        setTimeout(() => offlineToast.classList.remove('show'), 3000);
        return; 
      }

      if (isErrorState) { window.location.reload(); return; }

      hasUserClicked = true;

      if (isGasLoaded) {
        revealApp();
      } else {
        btnStart.innerText = "Conectando...";
        btnStart.classList.remove('ready');
        btnStart.disabled = true;
      }
    });

    function revealApp() {
      splash.classList.add('hidden');
      iframe.classList.add('loaded');
      history.pushState({ screen: 'app' }, '', window.location.href);
    }

    history.replaceState({ screen: 'splash' }, '', window.location.href);
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.screen === 'splash') {
        splash.classList.remove('hidden');
        iframe.classList.remove('loaded');
        hasUserClicked = false;
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Erro:', err));
      });
    }
  </script>
</body>
</html>
