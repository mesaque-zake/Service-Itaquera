<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  
  <title>Service - Itaquera</title>
  
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/favicon.png">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/Icon180.png">
  <link rel="manifest" href="./manifest.json">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@300;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #ffffff;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --accent-color: #000000;
    }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main);
    }

    /* --- TOAST DE OFFLINE --- */
    #offline-toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 59, 48, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 59, 48, 0.3); color: #ff3b30;
      padding: 12px 24px; border-radius: 30px; z-index: 10000;
      font-weight: 600; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #offline-toast.show { top: env(safe-area-inset-top, 24px); }

    /* --- O NÚCLEO (IFRAME) --- */
    #app-frame {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
      opacity: 0; visibility: hidden; z-index: 0; background-color: var(--bg-color);
      padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
      transition: opacity 0.8s ease-in-out, visibility 0.8s;
    }
    #app-frame.loaded { opacity: 1; visibility: visible; z-index: 20; }

    /* --- SPLASH SCREEN --- */
    #splash {
      position: fixed; inset: 0; background: var(--bg-color);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9000; transition: opacity 0.8s ease-out, visibility 0.8s; overflow: hidden;
    }
    #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* ANIMAÇÕES DE FUNDO (Luzes abstratas e suaves) */
    .blob {
      position: absolute; border-radius: 50%; filter: blur(80px); z-index: 1; opacity: 0.4;
      animation: float 15s infinite alternate ease-in-out;
    }
    /* Cores corporativas e sutis para manter a elegância no branco */
    .blob-1 { width: 50vw; height: 50vw; max-width: 600px; max-height: 600px; background: #007aff; top: -15%; left: -10%; animation-delay: 0s; }
    .blob-2 { width: 60vw; height: 60vw; max-width: 700px; max-height: 700px; background: #34c759; bottom: -15%; right: -10%; animation-delay: -5s; }
    .blob-3 { width: 40vw; height: 40vw; max-width: 500px; max-height: 500px; background: #5856d6; top: 30%; left: 30%; animation-delay: -10s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(6vw, 8vh) scale(1.15); }
    }

    /* --- COREOGRAFIA UI --- */
    
    /* 1. Branding (Logo e Powered By) - Inicia no centro e desce rápido */
    .footer-splash {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(1.4);
      z-index: 10; text-align: center; width: 100%;
      animation: moveBranding 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 0.5s; /* Começa a descer em meio segundo */
    }
    @keyframes moveBranding {
      to { top: calc(100% - env(safe-area-inset-bottom, 24px) - 70px); transform: translate(-50%, 0) scale(1); }
    }
    .footer-splash img { width: 100px; margin-bottom: 8px; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.05)); }
    .powered-by { font-size: 0.8rem; color: var(--text-muted); opacity: 0; animation: fadeIn 0.5s forwards; animation-delay: 1.2s; }
    .powered-by strong { color: var(--text-main); }

    /* 2. Conteúdo Central Livres (Textos e Botão) */
    .center-content {
      position: relative; z-index: 10; text-align: center; width: 90%; max-width: 800px;
      opacity: 0; transform: translateY(30px);
      animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 1s; /* Surge logo após o logo começar a descer */
    }

    .welcome-text { 
      font-size: clamp(0.9rem, 1.5vw, 1.2rem); font-weight: 600; color: var(--text-muted); 
      text-transform: uppercase; letter-spacing: 4px; margin-bottom: 8px; 
    }
    
    /* Fonte Elegante e Impactante */
    .brand-service { 
      font-family: 'Montserrat', sans-serif; 
      font-size: clamp(3.5rem, 10vw, 8rem); font-weight: 800; color: var(--text-main); 
      line-height: 1; letter-spacing: -2px; margin: 0;
    }
    
    /* Fonte Fina e Sofisticada */
    .brand-unit {
      font-family: 'Montserrat', sans-serif; 
      font-size: clamp(1rem, 3vw, 2rem); font-weight: 300; color: var(--text-main);
      text-transform: uppercase; letter-spacing: clamp(6px, 1vw, 12px); 
      margin-top: 5px; margin-bottom: 60px;
    }

    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* 3. Botão de Ação */
    #btn-start {
      background: var(--accent-color); color: #ffffff; border: none; border-radius: 50px;
      padding: 18px 45px; font-size: 1.1rem; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); outline: none; -webkit-tap-highlight-color: transparent;
    }
    #btn-start:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25); }
    #btn-start:active:not(:disabled) { transform: translateY(1px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); }
    
    /* Estados do Botão */
    #btn-start:disabled { background: #e5e5ea; color: #86868b; cursor: wait; box-shadow: none; }
    #btn-start.error-state { background: #ff3b30; color: #ffffff; box-shadow: 0 8px 25px rgba(255, 59, 48, 0.3); }

  </style>
</head>
<body>

  <div id="offline-toast">Sem conexão de internet</div>

  <div id="splash">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div> 
    
    <div class="center-content">
      <div class="welcome-text">Bem-vindo ao</div>
      <h1 class="brand-service">SERVICE</h1>
      <h2 class="brand-unit">Unidade Itaquera</h2>
      
      <button id="btn-start" disabled>Carregando sistema...</button>
    </div>

    <div class="footer-splash">
      <img src="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/SescLogo.png" alt="Sesc Logo">
      <div class="powered-by">Powered with <span style="color: #ff2d55;">&#10084;</span> by <strong>Mesaque</strong></div>
    </div>
  </div>

  <iframe 
     id="app-frame" 
     allow="geolocation; microphone; camera; clipboard-write; autoplay; fullscreen"
     sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-modals allow-downloads"
  ></iframe>
  
  <script>
    // ELEMENTOS
    const splash = document.getElementById('splash');
    const iframe = document.getElementById('app-frame');
    const btnStart = document.getElementById('btn-start');
    const offlineToast = document.getElementById('offline-toast');
    
    // SUA URL DO GAS
    const gasUrl = "https://script.google.com/macros/s/AKfycbxzjNxBAt3Q3_Ox0j8Mg-fKkoyJtyUHLUUFjHjfa_yH9yv8VrP0dMmKXyKAF_pbx5z-mg/exec";

    // ESTADOS
    let isGasLoaded = false;
    let hasUserClicked = false;
    let isErrorState = false;

    // MONITOR DE REDE
    window.addEventListener('offline', () => offlineToast.classList.add('show'));
    window.addEventListener('online', () => offlineToast.classList.remove('show'));

    // 1. INJEÇÃO DO IFRAME IMEDIATA (Background loading)
    iframe.src = gasUrl;

    // 2. CÃO DE GUARDA (Fail-safe de 15 segundos)
    const watchdogTimer = setTimeout(() => {
      if (!isGasLoaded) {
        isErrorState = true;
        btnStart.innerText = "Falha de conexão. Tentar novamente?";
        btnStart.classList.add('error-state');
        btnStart.disabled = false;
      }
    }, 15000);

    // 3. IFRAME CARREGADO
    iframe.onload = () => {
      if (iframe.src === 'about:blank') return;
      
      isGasLoaded = true;
      clearTimeout(watchdogTimer); 

      if (hasUserClicked) {
        revealApp();
      } else {
        if (btnStart.disabled && !isErrorState) {
          btnStart.innerText = "Acessar Serviço";
          btnStart.disabled = false;
        }
      }
    };

    // 4. AÇÃO DE CLIQUE
    btnStart.addEventListener('click', () => {
      if (!navigator.onLine) { 
        offlineToast.classList.add('show');
        setTimeout(() => offlineToast.classList.remove('show'), 3000);
        return; 
      }

      if (isErrorState) { window.location.reload(); return; }

      hasUserClicked = true;

      if (isGasLoaded) {
        revealApp();
      } else {
        btnStart.innerText = "Conectando...";
        btnStart.disabled = true;
      }
    });

    // FUNÇÃO DE TRANSIÇÃO (Lógica + Armadilha de Histórico)
    function revealApp() {
      splash.classList.add('hidden');
      iframe.classList.add('loaded');
      // Push state para o botão voltar do celular funcionar direito
      history.pushState({ screen: 'app' }, '', window.location.href);
    }

    // 5. PREVENÇÃO DO BOTÃO VOLTAR (Evita sair do PWA sem querer)
    history.replaceState({ screen: 'splash' }, '', window.location.href);
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.screen === 'splash') {
        splash.classList.remove('hidden');
        iframe.classList.remove('loaded');
        hasUserClicked = false;
      }
    });

    // 6. REGISTRO DO SERVICE WORKER (Cache Offline)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Erro:', err));
      });
    }
  </script>
</body>
</html>
