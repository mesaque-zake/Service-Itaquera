<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" id="meta-theme-color" content="#ffffff">
  
  <title>Service - Itaquera</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@300;800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: 'Inter', sans-serif; }

    /* ----------------------------------
       O IFRAME (ESCONDIDO INICIALMENTE)
    ----------------------------------- */
    #app-frame {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border: none; z-index: 1; opacity: 0; /* Começa invisível */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      transition: opacity 1s ease-in-out; /* Revelação suave */
    }

    /* ----------------------------------
       SPLASH SCREEN (A COREOGRAFIA)
    ----------------------------------- */
    #splash-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; background-color: #ffffff; /* Fundo branco sólido para tapar o GAS */
      overflow: hidden; display: flex; flex-direction: column; align-items: center;
      transition: opacity 0.8s ease-in-out, visibility 0.8s;
    }

    /* Animação abstrata de fundo (Atrás do vidro) */
    .background-blobs {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11;
      opacity: 0; transition: opacity 1.5s ease-in-out; /* Surgem junto com o painel */
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(60px); animation: float 12s infinite ease-in-out alternate;
    }
    /* Cores suaves e modernas para contrastar com o branco */
    .blob.um { width: 350px; height: 350px; background: rgba(0, 113, 227, 0.15); top: 10%; left: -10%; }
    .blob.dois { width: 450px; height: 450px; background: rgba(255, 149, 0, 0.15); bottom: 10%; right: -15%; animation-delay: -6s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -60px) scale(1.1); }
    }

    /* O Vidro Fosco (Inicia invisível) */
    #glass-panel {
      z-index: 12; background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 24px; padding: 50px 30px;
      text-align: center; width: 90%; max-width: 380px; 
      margin-top: 18vh; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
      
      /* Estado Inicial (Escondido e levemente para baixo) */
      opacity: 0; transform: translateY(30px);
      transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Classe ativada pelo JS para mostrar o painel */
    #glass-panel.show { opacity: 1; transform: translateY(0); }

    .welcome-text { font-size: 1rem; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
    .title-text { 
      font-family: 'Montserrat', sans-serif; /* Fonte Elegante */
      font-size: 3.2rem; font-weight: 800; color: #1d1d1f; margin-bottom: 40px; letter-spacing: -2px; 
    }

    .btn-start {
      background: #000000; color: #ffffff; border: none; border-radius: 50px;
      padding: 18px 32px; font-size: 1.1rem; font-weight: 600; width: 100%;
      cursor: pointer; transition: transform 0.2s, background 0.2s;
    }
    .btn-start:active { transform: scale(0.96); }
    .btn-start:disabled { background: #e5e5ea; color: #86868b; cursor: not-allowed; }

    /* ----------------------------------
       BRANDING (LOGO E POWERED BY)
    ----------------------------------- */
    #branding {
      position: absolute; left: 0; right: 0; margin: auto; text-align: center; z-index: 13;
      display: flex; flex-direction: column; align-items: center;
      transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1); /* Curva de movimento suave (estilo Apple) */
    }

    #branding img { transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1); }
    
    .powered-by { font-size: 0.85rem; color: #86868b; margin-top: 12px; transition: all 1.2s; }
    .powered-by strong { color: #1d1d1f; }

    /* ESTADO 1: No Centro da Tela (Grande) */
    .center-stage {
      bottom: 50%; transform: translateY(50%);
    }
    .center-stage img { width: 160px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08)); }
    .center-stage .powered-by { font-size: 1rem; }

    /* ESTADO 2: No Rodapé (Pequeno) */
    .footer-stage {
      bottom: env(safe-area-inset-bottom, 24px); transform: translateY(-24px);
    }
    .footer-stage img { width: 100px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.05)); }
  </style>
</head>
<body>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbxzjNxBAt3Q3_Ox0j8Mg-fKkoyJtyUHLUUFjHjfa_yH9yv8VrP0dMmKXyKAF_pbx5z-mg/exec" allow="autoplay; camera; microphone"></iframe>

  <div id="splash-screen">
    
    <div class="background-blobs" id="bg-blobs">
      <div class="blob um"></div>
      <div class="blob dois"></div>
    </div>

    <div id="glass-panel">
      <div class="welcome-text">Bem-vindo ao</div>
      <div class="title-text">SERVICE</div>
      
      <button id="start-btn" class="btn-start" disabled>Carregando...</button>
    </div>

    <div id="branding" class="center-stage">
      <img src="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/SescLogo.png" alt="Sesc Logo">
      <div class="powered-by">
        Powered with <span style="color: #ff2d55;">&#10084;</span> by <strong>Mesaque</strong>
      </div>
    </div>

  </div>

  <script>
    // 1. REGISTRO DO SERVICE WORKER
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.error('Erro no SW', err));
      });
    }

    // 2. ELEMENTOS DA DOM
    const iframe = document.getElementById('app-frame');
    const startBtn = document.getElementById('start-btn');
    const splashScreen = document.getElementById('splash-screen');
    const branding = document.getElementById('branding');
    const glassPanel = document.getElementById('glass-panel');
    const bgBlobs = document.getElementById('bg-blobs');

    // 3. A COREOGRAFIA DE ABERTURA
    window.addEventListener('load', () => {
      // Aguarda 1.8 segundos exibindo a logo no centro, depois move e revela o vidro
      setTimeout(() => {
        // Move o logo para o rodapé
        branding.classList.remove('center-stage');
        branding.classList.add('footer-stage');
        
        // Revela o fundo dinâmico e o painel de vidro
        bgBlobs.style.opacity = '1';
        glassPanel.classList.add('show');
      }, 1800);
    });

    // 4. LÓGICA DO IFRAME E BOTÃO
    iframe.onload = () => {
      // Quando o GAS carrega por completo lá no fundo
      startBtn.textContent = 'Iniciar Serviço';
      startBtn.disabled = false;
    };

    startBtn.addEventListener('click', () => {
      // Dissolve a tela branca
      splashScreen.style.opacity = '0';
      
      // Revela o iframe do GAS
      iframe.style.opacity = '1';

      setTimeout(() => {
        splashScreen.style.visibility = 'hidden';
      }, 800); // Tempo do fade out

      history.pushState({ screen: 'app' }, '', window.location.href);
    });

    // 5. PREVENÇÃO DO BOTÃO VOLTAR
    history.replaceState({ screen: 'splash' }, '', window.location.href);
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.screen === 'splash') {
        splashScreen.style.visibility = 'visible';
        splashScreen.style.opacity = '1';
        iframe.style.opacity = '0';
      }
    });
  </script>
</body>
</html>
