<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  
  <title>Service - Itaquera</title>
  
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/favicon.png">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/Icon180.png">
  <link rel="manifest" href="./manifest.json">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@300;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --bg-color: #ffffff;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --sesc-azul: #005EB8;
      --sesc-amarelo: #FFC72C;
    }

    * { box-sizing: border-box; }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main);
    }

    /* --- TOAST DE OFFLINE --- */
    #offline-toast {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 59, 48, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 59, 48, 0.3); color: #ff3b30;
      padding: 12px 24px; border-radius: 30px; z-index: 10000;
      font-weight: 600; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #offline-toast.show { top: env(safe-area-inset-top, 24px); }

    /* --- IFRAME BACKGROUND --- */
    #app-frame {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
      opacity: 0; visibility: hidden; z-index: 0; background-color: var(--bg-color);
      padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
      transition: opacity 0.8s ease-in-out, visibility 0.8s;
    }
    #app-frame.loaded { opacity: 1; visibility: visible; z-index: 20; pointer-events: all; }

    /* --- SPLASH SCREEN PRINCIPAL --- */
    #splash {
      position: fixed; inset: 0; z-index: 9000; 
      transition: opacity 0.8s ease-out, visibility 0.8s; 
      overflow: hidden;
      display: grid; place-items: center; 
      background-color: var(--bg-color);
    }
    #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* LUZES DE FUNDO */
    .bg-blobs {
      position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;
      filter: blur(100px); opacity: 0.20; mix-blend-mode: multiply; pointer-events: none;
    }
    .blob { position: absolute; border-radius: 50%; animation: blobMove 18s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
    .blob-azul { width: 75vw; height: 75vw; background-color: var(--sesc-azul); top: -15%; left: -20%; }
    .blob-amarelo { width: 65vw; height: 65vw; background-color: var(--sesc-amarelo); bottom: -15%; right: -20%; animation-delay: -5s; }
    @keyframes blobMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(10%, 15%) scale(1.15); }
    }

    /* CAMADA DE ANIMAÇÃO DA MONTAGEM */
    #assembly-layer {
      position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;
    }
    .truck-wrapper { position: absolute; opacity: 0; font-size: 3.5rem; will-change: transform, left, opacity; }
    .truck-wrapper i { display: block; filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1)); }
    @keyframes driveRight { 0% { left: -30vw; opacity: 1; } 95% { opacity: 1; } 100% { left: 130vw; opacity: 0; } }
    @keyframes driveLeft { 0% { left: 130vw; opacity: 1; } 95% { opacity: 1; } 100% { left: -30vw; opacity: 0; } }
    .assembly-item { position: absolute; opacity: 0; transform: scale(0); will-change: transform, opacity; }

    /* --- Película de Vidro Fosco --- */
    .glass-overlay {
      position: absolute; inset: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.3) 100%);
      /* Reduzido para 0.5px para visão cristalina da animação */
      backdrop-filter: blur(0.5px) saturate(110%); -webkit-backdrop-filter: blur(0.5px) saturate(110%);
      border-top: 1px solid rgba(255, 255, 255, 0.3); 
    }

    /* --- CONTEÚDO PRINCIPAL (Zoom In do Fundo para Frente) --- */
    .center-content {
      position: relative; z-index: 4; text-align: center; width: 90%; max-width: 800px;
      opacity: 0; transform: scale(0.85); /* Começa menor, lá no fundo */
      /* Curva elástica leve para dar "vida" ao zoom */
      animation: zoomIn 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
      animation-delay: 2.1s; /* Sincronizado enquanto a logo sobe e desce */
    }
    @keyframes zoomIn { to { opacity: 1; transform: scale(1); } }

    .welcome-text { 
      font-size: 0.95rem; font-weight: 600; color: var(--text-muted); 
      text-transform: uppercase; letter-spacing: 4px; margin-bottom: 0px; 
    }
    
    .brand-service { 
      font-family: 'Poppins', sans-serif; 
      /* Max size do clamp reduzido para 6.5rem para adequar ao Desktop sem exageros */
      font-size: clamp(3.5rem, 10vw, 6.5rem); 
      font-weight: 900; line-height: 1.05; letter-spacing: -0.05em; margin: 0;
      background: linear-gradient(110deg, #1d1d1f 30%, #b0b0b5 50%, #1d1d1f 70%);
      background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: lightSweep 5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.05));
    }
    @keyframes lightSweep { to { background-position: 200% center; } }

    .brand-unit { 
      font-family: 'Poppins', sans-serif; font-size: clamp(1rem, 3vw, 1.4rem); 
      font-weight: 300; color: var(--text-main); text-transform: uppercase; 
      letter-spacing: clamp(5px, 0.8vw, 10px); margin-top: 0px; margin-bottom: 50px; 
    }

    /* Botão Azul */
    #btn-start {
      background: #e5e5ea; color: #86868b;
      border: none; border-radius: 50px; padding: 17px 48px; 
      font-size: 1.05rem; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: wait; box-shadow: none; outline: none; -webkit-tap-highlight-color: transparent;
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    #btn-start:disabled { animation: pulseBtn 2s infinite ease-in-out; }
    @keyframes pulseBtn { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(0.98); opacity: 1; } }
    #btn-start.ready { background: var(--sesc-azul); color: #ffffff; cursor: pointer; box-shadow: 0 10px 30px rgba(0, 94, 184, 0.3); animation: none; transform: scale(1); opacity: 1; }
    #btn-start.ready:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0, 94, 184, 0.4); }
    #btn-start.ready:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(0, 94, 184, 0.2); }
    #btn-start.error-state { background: #ff3b30; color: #ffffff; box-shadow: 0 8px 25px rgba(255, 59, 48, 0.3); animation: none; }

        /* --- CORTINAS: LOGO SUBINDO --- */
    .header-splash {
      position: absolute; left: 50%; 
      top: 44%; /* Ajustado: nasce levemente acima do centro */
      transform: translate(-50%, -50%) scale(1.3);
      z-index: 5; text-align: center;
      animation: moveLogoUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 1.5s; 
    }
    .header-splash img { width: 90px; }
    @keyframes moveLogoUp {
      to { 
        top: max(env(safe-area-inset-top, 40px), 40px); 
        transform: translate(-50%, 0) scale(1); 
      }
    }

    /* --- CORTINAS: POWERED DESCENDO --- */
    .footer-splash {
      position: absolute; left: 50%; 
      top: 56%; /* Ajustado: nasce levemente abaixo do centro, sem sobrepor o logo */
      transform: translate(-50%, -50%) scale(1.3);
      z-index: 5; text-align: center; width: 100%;
      animation: movePoweredDown 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      animation-delay: 1.5s; 
    }
    @keyframes movePoweredDown {
      to { 
        top: 100%; 
        transform: translate(-50%, calc(-100% - env(safe-area-inset-bottom, 24px) - 20px)); 
        scale: 1; 
      }
    }

  </style>
</head>
<body>

  <div id="offline-toast">Sem conexão de internet</div>

  <div id="splash">
    
    <div class="bg-blobs">
      <div class="blob blob-azul"></div>
      <div class="blob blob-amarelo"></div>
    </div>
    
    <div id="assembly-layer"></div>
    
    <div class="glass-overlay"></div>
    
    <div class="header-splash">
      <img src="https://raw.githubusercontent.com/mesaque-zake/Service-Itaquera/refs/heads/main/SescLogo.png" alt="Sesc Logo">
    </div>

    <div class="center-content">
      <div class="welcome-text">Bem-vindo ao</div>
      <h1 class="brand-service">SERVICE</h1>
      <h2 class="brand-unit">Unidade Itaquera</h2>
      <button id="btn-start" disabled>Preparando...</button>
    </div>

    <div class="footer-splash">
      <div class="powered-by">Powered with <span style="color:#ff3b30; text-shadow: 0 0 4px rgba(255,59,48,0.3);">&#10084;</span> by <strong>Mesaque</strong></div>
    </div>
  </div>

  <iframe 
     id="app-frame" 
     allow="geolocation; microphone; camera; clipboard-write; autoplay; fullscreen"
     sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-modals allow-downloads"
  ></iframe>
  
  <script>
    // --------------------------------------------------------
    // COREOGRAFIA 3D: AJUSTE FINAL DA PLATEIA (Sem buracos)
    // --------------------------------------------------------
    function playAssemblyAnimation() {
      const layer = document.getElementById('assembly-layer');
      const truckDuration = 4;
      
      const truckRoutes = [
        // Rota 0 (Fundo): Passa entre a fileira 3 e 2 (Z-index 3)
        { direction: 'Right', startTime: 0, bottom: '26vh', zIndex: 3, truckScale: 0.6 },
        // Rota 1 (Frente): Passa na frente de todos (Z-index 6)
        { direction: 'Left',  startTime: 4, bottom: '11vh',  zIndex: 6, truckScale: 1.0 }, 
        // Rota 2 (Topo - Barreiras): (Z-index 1)
        { direction: 'Right', startTime: 8, bottom: '70vh', zIndex: 1,  truckScale: 0.8 }  
      ];

      // Geometria totalmente contígua, espaçamento progressivo visual (3vh, 4vh, 5vh)
      const elementsConfig = [
        { items: 10, icon: 'fa-chair', bottom: '27vh', scale: 0.50, color: '#5a5a5a', zIndex: 1, routeIndex: 0, widthPercent: 0.50 },
        { items: 10, icon: 'fa-chair', bottom: '24vh', scale: 0.60, color: '#4a4a4a', zIndex: 2, routeIndex: 0, widthPercent: 0.60 },
        // Fim do corredor: Fileira 2 bem colada na 3
        { items: 10, icon: 'fa-chair', bottom: '20vh', scale: 0.75, color: '#3a3a3a', zIndex: 4, routeIndex: 1, widthPercent: 0.70 },
        { items: 10, icon: 'fa-chair', bottom: '15vh', scale: 0.95, color: '#1d1d1f', zIndex: 5, routeIndex: 1, widthPercent: 0.85 },
        // Barreiras
        { items: 4, icon: 'fa-road-barrier', bottom: '70vh', scale: 1.2, color: '#FF8C00', zIndex: 1, routeIndex: 2, widthPercent: 0.60 }
      ];

      truckRoutes.forEach((route) => {
        let wrapper = document.createElement('div');
        wrapper.className = 'truck-wrapper';
        wrapper.style.bottom = route.bottom;
        wrapper.style.zIndex = route.zIndex; 
        wrapper.style.animation = `drive${route.direction} ${truckDuration}s linear forwards`;
        wrapper.style.animationDelay = `${route.startTime}s`;
        
        let truckIcon = document.createElement('i');
        truckIcon.className = 'fa-solid fa-truck';
        truckIcon.style.color = 'var(--sesc-azul)';
        let flipDir = route.direction === 'Left' ? -1 : 1;
        truckIcon.style.transform = `scaleX(${flipDir}) scale(${route.truckScale})`;

        wrapper.appendChild(truckIcon);
        layer.appendChild(wrapper);
      });

      elementsConfig.forEach(row => {
        let route = truckRoutes[row.routeIndex];
        let containerWidth = window.innerWidth;
        let rowWidth = containerWidth * row.widthPercent;
        let startX = (containerWidth - rowWidth) / 2; 
        let gap = rowWidth / (row.items - 1);

        for (let i = 0; i < row.items; i++) {
          let item = document.createElement('i');
          item.className = `fa-solid ${row.icon} assembly-item`;
          item.style.color = row.color;
          item.style.left = `${startX + (i * gap)}px`;
          item.style.bottom = row.bottom;
          item.style.zIndex = row.zIndex;
          
          let itemIndexForDelay = route.direction === 'Right' ? i : (row.items - 1 - i);
          let popDelay = route.startTime + (truckDuration * (itemIndexForDelay / row.items)) + 0.3; 
          
          setTimeout(() => {
            item.style.transition = "all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)";
            item.style.opacity = '1'; 
            item.style.transform = `scale(${row.scale})`;
          }, popDelay * 1000);

          layer.appendChild(item);
        }
      });
    }
    
    playAssemblyAnimation();

    // --------------------------------------------------------
    // LÓGICA CORE DO PWA E IFRAME
    // --------------------------------------------------------
    const splash = document.getElementById('splash');
    const iframe = document.getElementById('app-frame');
    const btnStart = document.getElementById('btn-start');
    const offlineToast = document.getElementById('offline-toast');
    
    const gasUrl = "https://script.google.com/macros/s/AKfycbxzjNxBAt3Q3_Ox0j8Mg-fKkoyJtyUHLUUFjHjfa_yH9yv8VrP0dMmKXyKAF_pbx5z-mg/exec";
    let isGasLoaded = false, hasUserClicked = false, isErrorState = false;

    window.addEventListener('offline', () => offlineToast.classList.add('show'));
    window.addEventListener('online', () => offlineToast.classList.remove('show'));

    iframe.src = gasUrl;

    const watchdogTimer = setTimeout(() => {
      if (!isGasLoaded) {
        isErrorState = true;
        btnStart.innerText = "Falha de conexão. Tentar novamente?";
        btnStart.classList.remove('ready');
        btnStart.classList.add('error-state');
        btnStart.disabled = false;
      }
    }, 15000);

    iframe.onload = () => {
      if (iframe.src === 'about:blank') return;
      isGasLoaded = true;
      clearTimeout(watchdogTimer); 

      if (hasUserClicked) {
        revealApp();
      } else if (btnStart.disabled && !isErrorState) {
        btnStart.innerText = "Acessar";
        btnStart.classList.add('ready');
        btnStart.disabled = false;
      }
    };

    btnStart.addEventListener('click', () => {
      if (!navigator.onLine) { 
        offlineToast.classList.add('show');
        setTimeout(() => offlineToast.classList.remove('show'), 3000);
        return; 
      }
      if (isErrorState) { window.location.reload(); return; }
      
      hasUserClicked = true;
      if (isGasLoaded) { revealApp(); } 
      else { btnStart.innerText = "Conectando..."; btnStart.classList.remove('ready'); btnStart.disabled = true; }
    });

    function revealApp() {
      splash.classList.add('hidden');
      iframe.classList.add('loaded');
      history.pushState({ screen: 'app' }, '', window.location.href);
    }

    history.replaceState({ screen: 'splash' }, '', window.location.href);
    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.screen === 'splash') {
        splash.classList.remove('hidden');
        iframe.classList.remove('loaded');
        hasUserClicked = false;
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Erro:', err));
      });
    }
  </script>
</body>
</html>
